name: CLI Release

on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: apps/cli
        run: bun install

      - name: Build binaries (all platforms)
        working-directory: apps/cli
        run: |
          mkdir -p dist

          bun build --compile --minify \
            --target=bun-linux-x64 \
            src/index.ts \
            --outfile dist/sp-linux-x64

          bun build --compile --minify \
            --target=bun-linux-arm64 \
            src/index.ts \
            --outfile dist/sp-linux-arm64

          bun build --compile --minify \
            --target=bun-darwin-x64 \
            src/index.ts \
            --outfile dist/sp-darwin-x64

          bun build --compile --minify \
            --target=bun-darwin-arm64 \
            src/index.ts \
            --outfile dist/sp-darwin-arm64

      - name: Verify binaries exist
        working-directory: apps/cli
        run: |
          ls -lh dist/
          for f in dist/sp-linux-x64 dist/sp-linux-arm64 dist/sp-darwin-x64 dist/sp-darwin-arm64; do
            if [[ ! -s "$f" ]]; then
              echo "Missing or empty: $f"
              exit 1
            fi
          done

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#cli-v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "CLI v${{ steps.version.outputs.VERSION }}"
          body: |
            ## SSL Pilot CLI v${{ steps.version.outputs.VERSION }}

            ### Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/nafishahmeddev/ssl-pilot/main/apps/cli/install.sh | sudo bash
            ```

            ### Uninstall

            ```bash
            curl -fsSL https://raw.githubusercontent.com/nafishahmeddev/ssl-pilot/main/apps/cli/uninstall.sh | sudo bash
            ```

            ### Manual download

            | Platform | File |
            |----------|------|
            | Linux x64 | `sp-linux-x64` |
            | Linux ARM64 | `sp-linux-arm64` |
            | macOS x64 | `sp-darwin-x64` |
            | macOS ARM64 (Apple Silicon) | `sp-darwin-arm64` |

            ### Usage

            ```bash
            export SSL_PILOT_API_KEY='sslpilot_...'

            sp list
            sudo sp download
            sudo sp download '*.example.com'
            sudo sp download --id <cert-id>
            ```
          files: |
            apps/cli/dist/sp-linux-x64
            apps/cli/dist/sp-linux-arm64
            apps/cli/dist/sp-darwin-x64
            apps/cli/dist/sp-darwin-arm64
            apps/cli/install.sh
            apps/cli/uninstall.sh
          draft: false
          prerelease: false
