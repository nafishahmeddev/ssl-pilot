name: CLI Release

on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: apps/cli
        run: bun install

      - name: Build binaries (all platforms)
        working-directory: apps/cli
        run: |
          mkdir -p dist

          bun build --compile --minify \
            --target=bun-linux-x64 \
            src/index.ts \
            --outfile dist/sp-linux-x64

          bun build --compile --minify \
            --target=bun-linux-arm64 \
            src/index.ts \
            --outfile dist/sp-linux-arm64

          bun build --compile --minify \
            --target=bun-darwin-x64 \
            src/index.ts \
            --outfile dist/sp-darwin-x64

          bun build --compile --minify \
            --target=bun-darwin-arm64 \
            src/index.ts \
            --outfile dist/sp-darwin-arm64

      - name: Verify binaries exist
        working-directory: apps/cli
        run: |
          ls -lh dist/
          for f in dist/sp-linux-x64 dist/sp-linux-arm64 dist/sp-darwin-x64 dist/sp-darwin-arm64; do
            if [[ ! -s "$f" ]]; then
              echo "Missing or empty: $f"
              exit 1
            fi
          done

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#cli-v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "CLI v${{ steps.version.outputs.VERSION }}"
          body: |
            ## SSL Pilot CLI v${{ steps.version.outputs.VERSION }}

            ### Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/nafishahmeddev/ssl-pilot/main/apps/cli/install.sh | sudo bash
            ```

            ### Uninstall

            ```bash
            curl -fsSL https://raw.githubusercontent.com/nafishahmeddev/ssl-pilot/main/apps/cli/uninstall.sh | sudo bash
            ```

            ### Manual download

            | Platform | File |
            |----------|------|
            | Linux x64 | `sp-linux-x64` |
            | Linux ARM64 | `sp-linux-arm64` |
            | macOS x64 | `sp-darwin-x64` |
            | macOS ARM64 (Apple Silicon) | `sp-darwin-arm64` |

            ---

            ### Quick start

            ```bash
            # 1. Set your API key (get it from the SSL Pilot dashboard → API Keys)
            export SSL_PILOT_API_KEY='sslpilot_...'

            # 2. List certificates
            sp list

            # 3. Download a certificate (interactive picker)
            sudo sp download

            # 4. Download a specific domain
            sudo sp download '*.example.com'

            # 5. Download by ID
            sudo sp download --id <cert-id>
            ```

            ### Auto-renewal service (Linux / systemd)

            ```bash
            # Install and configure the background service
            sudo -E sp service install

            # Service management
            sp service status                # show status
            sudo sp service check            # run one check cycle now (test hooks/config)
            sudo sp service start            # start
            sudo sp service stop             # stop
            sudo sp service uninstall        # remove service unit (keeps certs and config)

            # Follow logs
            journalctl -u ssl-pilot -f
            ```

            The service monitors watched domains, compares expiry dates locally, and re-downloads certificates before they expire. Post-download hook scripts in `/etc/ssl-pilot/hooks/` are executed automatically.

            ### File layout

            ```
            /etc/ssl-pilot/
              config.json          Service configuration
              state.json           Local expiry cache
              hooks/
                global.sh          Runs after every download
                example.com.sh     Runs after example.com downloads
              example.com/
                certificate.crt    Certificate  (644)
                private.key        Private key  (600)
            ```

            ### Full setup guide

            See [SETUP.md](https://github.com/nafishahmeddev/ssl-pilot/blob/main/apps/cli/SETUP.md)
          files: |
            apps/cli/dist/sp-linux-x64
            apps/cli/dist/sp-linux-arm64
            apps/cli/dist/sp-darwin-x64
            apps/cli/dist/sp-darwin-arm64
            apps/cli/install.sh
            apps/cli/uninstall.sh
          draft: false
          prerelease: false
